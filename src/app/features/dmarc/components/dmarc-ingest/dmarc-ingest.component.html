<div class="container mx-auto p-6 max-w-4xl">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Ingest DMARC Report</h1>
    <p class="text-gray-600 dark:text-gray-400">Add a new DMARC aggregate report to the system.</p>
  </div>

  <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
    {{ error }}
  </div>

  <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
    <!-- Tabs -->
    <div class="flex border-b border-gray-200 dark:border-gray-700">
      <button
        (click)="setTab('xml')"
        [class.border-blue-500]="activeTab === 'xml'"
        [class.text-blue-600]="activeTab === 'xml'"
        class="px-6 py-3 border-b-2 font-medium text-sm focus:outline-none transition-colors"
      >
        Paste XML
      </button>
      <button
        (click)="setTab('email')"
        [class.border-blue-500]="activeTab === 'email'"
        [class.text-blue-600]="activeTab === 'email'"
        class="px-6 py-3 border-b-2 font-medium text-sm focus:outline-none transition-colors"
      >
        Upload Email (.eml)
      </button>
    </div>

    <!-- Tab Content -->
    <div class="p-6">
      <!-- XML Content -->
      <div *ngIf="activeTab === 'xml'">
        <form (ngSubmit)="ingestXml()">
          <div class="mb-4">
            <label for="xmlPayload" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Raw XML Content
            </label>
            <textarea
              id="xmlPayload"
              name="xmlPayload"
              [(ngModel)]="xmlPayload"
              rows="12"
              required
              placeholder='<?xml version="1.0" encoding="UTF-8" ?>...'
              class="w-full px-4 py-2 font-mono text-sm border border-gray-300 dark:border-gray-600 rounded-md focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white"
            ></textarea>
          </div>
          <div class="flex justify-end">
            <button
              type="submit"
              [disabled]="loading || !xmlPayload.trim()"
              class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 flex items-center"
            >
              <span *ngIf="loading" class="mr-2 animate-spin">&#9696;</span>
              Process XML
            </button>
          </div>
        </form>
      </div>

      <!-- Email Content -->
      <div *ngIf="activeTab === 'email'">
        <form (ngSubmit)="ingestEmail()">
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              Select .eml file
            </label>
            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 dark:border-gray-600 border-dashed rounded-md hover:border-blue-400 transition-colors">
              <div class="space-y-1 text-center">
                <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                  <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <div class="flex text-sm text-gray-600 dark:text-gray-400">
                  <label for="file-upload" class="relative cursor-pointer bg-transparent rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
                    <span>Upload a file</span>
                    <input id="file-upload" name="file-upload" type="file" class="sr-only" (change)="onFileSelected($event)" accept=".eml">
                  </label>
                  <p class="pl-1">or drag and drop</p>
                </div>
                <p class="text-xs text-gray-500 dark:text-gray-400">
                  .eml up to 10MB
                </p>
                <p *ngIf="selectedFile" class="text-sm font-semibold text-blue-600 mt-2">
                  Selected: {{ selectedFile.name }}
                </p>
              </div>
            </div>
          </div>
          <div class="flex justify-end">
            <button
              type="submit"
              [disabled]="loading || !selectedFile"
              class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 flex items-center"
            >
              <span *ngIf="loading" class="mr-2 animate-spin">&#9696;</span>
              Process Email
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="mt-8 bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-400 p-4">
    <div class="flex">
      <div class="flex-shrink-0">
        <svg class="h-5 w-5 text-blue-400" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
        </svg>
      </div>
      <div class="ml-3 text-sm text-blue-700 dark:text-blue-300">
        <p>After successful processing, you will be redirected to the report detail view where you can see the classified IP tiers and results.</p>
      </div>
    </div>
  </div>
</div>
