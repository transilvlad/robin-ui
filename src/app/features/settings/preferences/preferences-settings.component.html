<div class="page-root">
  <div class="page-header flex justify-between items-center mb-6">
    <div>
      <h1>Preferences</h1>
      <p class="page-subtitle">Customize how information is displayed across the application.</p>
    </div>
  </div>

  <!-- Date Format -->
  <div class="card mb-6">
    <div class="card-header border-b border-border pb-4">
      <h3 class="card-title">Date Format</h3>
      <p class="text-sm text-muted-foreground mt-1">Choose how dates and timestamps are displayed throughout the application.</p>
    </div>
    <div class="card-content pt-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        @for (item of presets; track item.id) {
          <button
            (click)="selectPreset(item.id)"
            class="flex flex-col items-start gap-2 rounded-lg border p-4 text-left transition-colors"
            [class.border-primary]="item.id === currentPresetId"
            [class.bg-primary/5]="item.id === currentPresetId"
            [class.border-border]="item.id !== currentPresetId"
            [class.hover:border-primary/50]="item.id !== currentPresetId">
            <div class="flex w-full items-center justify-between">
              <span class="text-xs font-semibold text-muted-foreground uppercase tracking-wide">
                {{ item.id === 'medium' ? 'Medium' : item.id === 'short-us' ? 'US' : item.id === 'short-eu' ? 'EU' : 'ISO 8601' }}
              </span>
              @if (item.id === currentPresetId) {
                <svg class="h-4 w-4 text-primary shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
              }
            </div>
            <div class="space-y-1">
              <p class="text-sm font-medium font-mono">{{ previewDate | appDate:'date' }}</p>
              <p class="text-xs text-muted-foreground font-mono">{{ previewDate | appDate }}</p>
            </div>
          </button>
        }
      </div>
    </div>
  </div>
</div>
