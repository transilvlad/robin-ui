name: OWASP Dependency Check

on:
  push:
    branches: [ main, main_domain_management ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  dependency-check:
    name: Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write  # For SARIF upload
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Cache dependency-check database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-db-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os}}-owasp-db-

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        with:
          project: 'Robin Gateway'
          path: './robin-gateway'
          format: 'ALL'
          args: >
            --failOnCVSS 7
            --suppression ./robin-gateway/dependency-check-suppressions.xml
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
            --nvdApiDelay 8000
            --nvdMaxRetryCount 10

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ github.workspace }}/reports/dependency-check-report.sarif

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report-${{ github.run_number }}
          path: |
            ${{ github.workspace }}/reports/dependency-check-report.html
            ${{ github.workspace }}/reports/dependency-check-report.json
            ${{ github.workspace }}/reports/dependency-check-report.xml
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ github.workspace }}/reports/dependency-check-report.json';

            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const vulnerabilities = report.dependencies?.filter(d => d.vulnerabilities?.length > 0) || [];

              let comment = '## 🔒 OWASP Dependency Check Results\n\n';

              if (vulnerabilities.length === 0) {
                comment += '✅ No vulnerabilities found!\n';
              } else {
                comment += `⚠️ Found ${vulnerabilities.length} dependencies with vulnerabilities\n\n`;
                comment += '| Dependency | Severity | CVE |\n';
                comment += '|------------|----------|-----|\n';

                vulnerabilities.forEach(dep => {
                  dep.vulnerabilities.forEach(vuln => {
                    const severity = vuln.severity || 'UNKNOWN';
                    const cve = vuln.name || 'N/A';
                    comment += `| ${dep.fileName} | ${severity} | ${cve} |\n`;
                  });
                });

                comment += `\n📊 View full report in workflow artifacts\n`;
              }

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Fail on high severity vulnerabilities
        if: failure()
        run: |
          echo "❌ Security vulnerabilities found with CVSS >= 7"
          echo "📋 Review the dependency-check-report.html for details"
          exit 1
