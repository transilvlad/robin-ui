sonar.projectKey=robin-gateway
sonar.projectName=Robin Gateway
sonar.sourceEncoding=UTF-8

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Quality Gates
sonar.qualitygate.wait=true
sonar.coverage.minimum=60.0
sonar.duplicated_lines_density.maximum=3.0
sonar.violations.blocker=0
sonar.violations.critical=0

# Exclusions
sonar.exclusions=**/model/**,**/dto/**,**/config/**
sonar.test.exclusions=**/integration/**
